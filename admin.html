<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin · Generator Undangan Aqiqah</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#2B2620; --cream:#F7F2E7; --cream-2:#EFE6D3;
    --sage:#6B7F5C; --sage-deep:#3D4A33; --gold:#C9A55C; --line:rgba(61,74,51,.18);
  }
  *{box-sizing:border-box;}
  body{margin:0; background:var(--cream); color:var(--ink); font-family:'Jost',sans-serif; padding-bottom:60px;}
  h1,h2{font-family:'Cormorant Garamond',serif; font-weight:600;}
  .wrap{max-width:640px; margin:0 auto; padding:0 6%;}

  header{padding:36px 6% 24px; text-align:center; border-bottom:1px solid var(--line);}
  header h1{font-size:28px; margin:0;}
  header p{font-size:12px; color:var(--sage-deep); opacity:.75; margin-top:6px;}

  .card{background:#fff; border:1px solid var(--line); border-radius:18px; padding:24px 22px; margin-top:24px;}
  .card h2{font-size:18px; margin:0 0 16px;}
  label{display:block; font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:var(--sage-deep); margin:14px 0 6px;}
  label:first-of-type{margin-top:0;}
  input[type=text], input[type=datetime-local], input[type=url], textarea{
    width:100%; padding:12px 14px; border:1px solid var(--line); border-radius:10px;
    font-family:'Jost',sans-serif; font-size:14px; background:var(--cream); color:var(--ink);
  }
  textarea{resize:vertical; min-height:90px;}
  .row2{display:grid; grid-template-columns:1fr 1fr; gap:14px;}
  @media (max-width:520px){ .row2{grid-template-columns:1fr;} }

  .btn{
    display:inline-flex; align-items:center; justify-content:center; gap:8px;
    border:none; border-radius:999px; padding:13px 24px; font-size:13px;
    letter-spacing:.06em; text-transform:uppercase; cursor:pointer; min-height:44px;
  }
  .btn-primary{background:var(--sage-deep); color:var(--cream); width:100%; margin-top:22px;}
  .btn-secondary{background:var(--cream-2); color:var(--sage-deep); border:1px solid var(--line);}
  .btn-small{padding:8px 14px; font-size:11px; min-height:36px;}

  .save-status{font-size:12px; color:var(--sage); margin-top:10px; text-align:center; opacity:0; transition:opacity .3s;}
  .save-status.show{opacity:1;}

  table{width:100%; border-collapse:collapse; margin-top:6px;}
  th{font-size:10px; letter-spacing:.08em; text-transform:uppercase; text-align:left; color:var(--sage-deep); opacity:.7; padding:8px 6px; border-bottom:1px solid var(--line);}
  td{padding:10px 6px; border-bottom:1px solid var(--line); font-size:13px; vertical-align:middle;}
  td.link-cell{font-size:11px; color:var(--sage); word-break:break-all;}
  .empty-row td{text-align:center; opacity:.5; font-style:italic; padding:20px 0;}

  .preview-link{display:block; text-align:center; margin-top:18px; font-size:13px; color:var(--sage-deep); text-decoration:underline;}

  .toast{
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(20px);
    background:var(--sage-deep); color:var(--cream); padding:10px 20px; border-radius:999px;
    font-size:12px; opacity:0; pointer-events:none; transition:all .25s ease;
  }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

<header>
  <h1>Generator Undangan</h1>
  <p>Atur data acara &amp; bagikan tautan ke tamu</p>
</header>

<div class="wrap">

  <!-- EVENT CONFIG -->
  <div class="card">
    <h2>Data Acara</h2>

    <label>Nama Lengkap Anak</label>
    <input type="text" id="childName" placeholder="Muhammad Arkan">

    <label>Nama Panggilan</label>
    <input type="text" id="childNickname" placeholder="Arkan">

    <div class="row2">
      <div>
        <label>Nama Ayah</label>
        <input type="text" id="fatherName" placeholder="Ahmad Fauzi">
      </div>
      <div>
        <label>Nama Ibu</label>
        <input type="text" id="motherName" placeholder="Siti Nurhaliza">
      </div>
    </div>

    <label>Tanggal &amp; Waktu Acara</label>
    <input type="datetime-local" id="eventDate">

    <label>Nama Lokasi</label>
    <input type="text" id="locationName" placeholder="Kediaman Keluarga">

    <label>Alamat Lengkap</label>
    <textarea id="locationAddress" placeholder="Jl. Melati No. 12, Jakarta Selatan"></textarea>

    <label>Link Google Maps</label>
    <input type="url" id="mapsUrl" placeholder="https://maps.google.com/...">

    <label>URL Musik Latar (.mp3)</label>
    <input type="url" id="audioUrl" placeholder="https://contoh.com/musik.mp3">
  </div>

  <!-- GUEST LIST -->
  <div class="card">
    <h2>Daftar Tamu</h2>
    <label>Nama Tamu (satu nama per baris, atau pisahkan dengan koma)</label>
    <textarea id="guestList" placeholder="Budi Santoso&#10;Siti Aminah&#10;Keluarga Bapak Hartono" style="min-height:120px;"></textarea>

    <label>Alamat Website Undangan (base URL)</label>
    <input type="text" id="baseUrl" placeholder="https://undangan-anda.com">

    <button class="btn btn-secondary" id="generateLinksBtn" style="margin-top:18px;">Buat Tautan Tamu</button>

    <table id="linksTable">
      <thead><tr><th>Nama Tamu</th><th>Tautan</th><th></th></tr></thead>
      <tbody id="linksBody">
        <tr class="empty-row"><td colspan="3">Belum ada tautan dibuat</td></tr>
      </tbody>
    </table>
  </div>

  <button class="btn btn-primary" id="saveBtn">Simpan Konfigurasi</button>
  <div class="save-status" id="saveStatus">Konfigurasi tersimpan di browser ini</div>

  <div class="card">
    <h2>Unduh / Pratinjau</h2>
    <p style="font-size:12px; opacity:.7; margin-top:-6px;">Simpan dulu sebelum mengunduh atau melihat pratinjau.</p>
    <button class="btn btn-secondary" id="downloadBtn" style="width:100%;">Unduh config.json</button>
    <a href="index.html" target="_blank" class="preview-link" id="previewLink">Buka pratinjau undangan →</a>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
(function(){
  var FIELDS = ['childName','childNickname','fatherName','motherName','locationName','locationAddress','mapsUrl','audioUrl'];

  function showToast(msg){
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(function(){ t.classList.remove('show'); }, 2000);
  }

  // ---------- Load existing config ----------
  function loadConfig(){
    try{
      var stored = localStorage.getItem('aqiqah_config');
      if(stored) return JSON.parse(stored);
    }catch(e){}
    return null;
  }
  var config = loadConfig();
  if(config){
    FIELDS.forEach(function(f){ if(config[f] && document.getElementById(f)) document.getElementById(f).value = config[f]; });
    if(config.eventDate) document.getElementById('eventDate').value = config.eventDate;
  }
  var baseUrl = localStorage.getItem('aqiqah_baseUrl') || (window.location.origin + window.location.pathname.replace('admin.html','') + 'index.html');
  document.getElementById('baseUrl').value = baseUrl;

  // ---------- Save config ----------
  function gatherConfig(){
    var cfg = {};
    FIELDS.forEach(function(f){ cfg[f] = document.getElementById(f).value.trim(); });
    cfg.eventDate = document.getElementById('eventDate').value;
    return cfg;
  }

  document.getElementById('saveBtn').addEventListener('click', function(){
    var cfg = gatherConfig();
    localStorage.setItem('aqiqah_config', JSON.stringify(cfg));
    localStorage.setItem('aqiqah_baseUrl', document.getElementById('baseUrl').value.trim());
    var status = document.getElementById('saveStatus');
    status.classList.add('show');
    setTimeout(function(){ status.classList.remove('show'); }, 2500);
    showToast('Konfigurasi tersimpan');
  });

  // ---------- Download config.json ----------
  document.getElementById('downloadBtn').addEventListener('click', function(){
    var cfg = gatherConfig();
    var blob = new Blob([JSON.stringify(cfg, null, 2)], {type:'application/json'});
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'config.json';
    a.click();
  });

  // ---------- Guest links ----------
  function slugify(name){
    return encodeURIComponent(name.trim().replace(/\s+/g,'+'));
  }

  document.getElementById('generateLinksBtn').addEventListener('click', function(){
    var raw = document.getElementById('guestList').value;
    var names = raw.split(/[\n,]/).map(function(s){ return s.trim(); }).filter(Boolean);
    var base = document.getElementById('baseUrl').value.trim().replace(/\/$/,'');
    var tbody = document.getElementById('linksBody');
    tbody.innerHTML = '';

    if(names.length === 0){
      tbody.innerHTML = '<tr class="empty-row"><td colspan="3">Belum ada tautan dibuat</td></tr>';
      return;
    }

    names.forEach(function(name){
      var link = base + '?to=' + slugify(name);
      var tr = document.createElement('tr');
      tr.innerHTML =
        '<td>' + name + '</td>' +
        '<td class="link-cell">' + link + '</td>' +
        '<td><button class="btn btn-secondary btn-small copy-btn" data-link="' + link + '">Copy</button></td>';
      tbody.appendChild(tr);
    });

    localStorage.setItem('aqiqah_baseUrl', base);
    showToast(names.length + ' tautan dibuat');
  });

  document.getElementById('linksBody').addEventListener('click', function(e){
    if(e.target.classList.contains('copy-btn')){
      var link = e.target.getAttribute('data-link');
      navigator.clipboard.writeText(link).then(function(){
        showToast('Tautan disalin');
      }).catch(function(){
        showToast('Gagal menyalin, salin manual');
      });
    }
  });

  // ---------- Preview link updates with base url ----------
  document.getElementById('previewLink').addEventListener('click', function(){
    // ensure latest config is saved before preview opens
    var cfg = gatherConfig();
    localStorage.setItem('aqiqah_config', JSON.stringify(cfg));
  });
})();
</script>
</body>
</html>
