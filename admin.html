<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Admin generator undangan aqiqah" />
  <title>Admin Generator - Undangan Aqiqah</title>
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body class="admin-body">
  <main class="admin-layout">
    <header class="admin-header">
      <p class="eyebrow">Static Configurator</p>
      <h1>Admin Generator Undangan Aqiqah</h1>
      <p>Isi data acara, unduh <code>config.json</code>, lalu letakkan file tersebut di folder utama sebelum deploy.</p>
    </header>

    <form id="configForm" class="admin-grid">
      <section class="admin-panel">
        <h2>Data Anak</h2>
        <label>Nama lengkap anak
          <input name="childFullName" type="text" required />
        </label>
        <label>Nama panggilan
          <input name="childNickname" type="text" required />
        </label>
        <label>Keterangan kelahiran / kalimat pendek
          <textarea name="birthInfo" rows="3"></textarea>
        </label>
      </section>

      <section class="admin-panel">
        <h2>Orang Tua</h2>
        <label>Nama ayah
          <input name="father" type="text" required />
        </label>
        <label>Nama ibu
          <input name="mother" type="text" required />
        </label>
      </section>

      <section class="admin-panel">
        <h2>Detail Acara</h2>
        <label>Tanggal & waktu acara
          <input name="dateTimeLocal" type="datetime-local" required />
        </label>
        <label>Offset zona waktu
          <select name="timezoneOffset">
            <option value="+07:00">WIB (+07:00)</option>
            <option value="+08:00" selected>WITA / Singapore (+08:00)</option>
            <option value="+09:00">WIT (+09:00)</option>
          </select>
        </label>
        <label>Label zona waktu
          <input name="timezoneLabel" type="text" value="WITA" />
        </label>
        <label>Teks hari/tanggal
          <input name="dateText" type="text" placeholder="Contoh: Kamis, 2 Juli 2026" />
        </label>
        <label>Teks waktu
          <input name="timeText" type="text" placeholder="Contoh: 17.00 WITA - selesai" />
        </label>
        <label>Nama tempat
          <input name="locationName" type="text" required />
        </label>
        <label>Alamat lengkap
          <textarea name="address" rows="3" required></textarea>
        </label>
        <label>Link Google Maps
          <input name="mapsUrl" type="url" placeholder="https://maps.google.com/..." />
        </label>
        <label>Link embed Google Maps, opsional
          <input name="mapsEmbedUrl" type="url" placeholder="https://www.google.com/maps/embed?..." />
        </label>
      </section>

      <section class="admin-panel">
        <h2>Media & Tema</h2>
        <label>URL musik MP3, opsional
          <input name="audioUrl" type="url" placeholder="assets/music.mp3 atau https://.../music.mp3" />
        </label>
        <label>Warna utama
          <input name="primaryColor" type="color" value="#8b6f47" />
        </label>
        <label>Warna sekunder
          <input name="secondaryColor" type="color" value="#f2e6d0" />
        </label>
        <label>Warna latar
          <input name="backgroundColor" type="color" value="#fffaf2" />
        </label>
      </section>

      <section class="admin-panel admin-panel-wide">
        <h2>Pesan Undangan</h2>
        <label>Kalimat pembuka
          <textarea name="opening" rows="3"></textarea>
        </label>
        <label>Doa
          <textarea name="prayer" rows="3"></textarea>
        </label>
        <label>Kalimat penutup
          <textarea name="closing" rows="3"></textarea>
        </label>
      </section>

      <section class="admin-panel admin-panel-wide">
        <h2>Daftar Tamu & Link</h2>
        <label>Base URL undangan
          <input name="baseUrl" type="url" />
        </label>
        <label>Daftar nama tamu, pisahkan dengan enter atau koma
          <textarea name="guestList" rows="6" placeholder="Budi Santoso&#10;Ibu Rina&#10;Keluarga Besar Andi"></textarea>
        </label>
        <div class="admin-actions">
          <button type="button" id="generateLinks" class="secondary-button">Generate Link Tamu</button>
          <button type="button" id="copyAllLinks" class="secondary-button">Copy Semua Link</button>
        </div>
        <div id="guestLinks" class="guest-links" aria-live="polite"></div>
      </section>

      <section class="admin-panel admin-panel-wide">
        <h2>Output Config</h2>
        <div class="admin-actions">
          <button type="button" id="downloadConfig" class="primary-button">Download config.json</button>
          <button type="button" id="saveDraft" class="secondary-button">Simpan Draft Browser</button>
          <button type="button" id="loadDraft" class="secondary-button">Muat Draft</button>
          <button type="button" id="openPreview" class="secondary-button">Preview Undangan</button>
        </div>
        <p id="adminStatus" class="status-text" role="status"></p>
        <pre id="jsonPreview" class="json-preview"></pre>
      </section>
    </form>
  </main>

  <script src="assets/js/admin.js"></script>
</body>
</html>
